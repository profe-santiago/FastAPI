[pytest]

# PYTHONPATH is set in conftest.py via sys.path.insert() so it works
# with any pytest version and environment without relying on ini options.
# (pythonpath = . was removed: it caused USAGE_ERROR on Ubuntu CI runners
#  where the system pytest or locale encoding could not handle it.)

# Directory where pytest looks for test files.
testpaths = tests

# Auto-discovery patterns.
python_files   = test_*.py
python_classes = Test*
python_functions = test_*

# Options applied to every pytest run.
# -v: verbose (shows full test name)   --tb=short: short tracebacks on failure
addopts = -v --tb=short
