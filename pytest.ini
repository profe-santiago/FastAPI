[pytest]

# ❌ ERROR: 'pythonpath = .' was removed — this option was added in pytest 7.0 and
#           causes USAGE_ERROR (exit code 4) on Ubuntu CI runners where the resolved
#           pytest version does not support it (e.g. system pytest from apt < 7.0).
# ✅ FIXED: path setup moved to conftest.py via sys.path.insert(), which works with
#           any pytest version and any environment without relying on ini options.

# Carpeta donde pytest busca los archivos de test.
testpaths = tests

# Patrones de descubrimiento automático.
python_files   = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones que se aplican a CADA ejecución de pytest.
#   -v          → verbose: muestra el nombre completo de cada test
#   --tb=short  → traceback corto si falla (más fácil de leer)
addopts = -v --tb=short
