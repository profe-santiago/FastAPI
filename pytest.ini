[pytest]

# Agrega el directorio actual (backend/) al PYTHONPATH.
# Sin esto, pytest no encuentra el paquete "app" al hacer "from app.main import app".
pythonpath = .

# Carpeta donde pytest busca los archivos de test.
testpaths = tests

# Patrones de descubrimiento automático.
python_files   = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones que se aplican a CADA ejecución de pytest.
#   -v          → verbose: muestra el nombre completo de cada test
#   --tb=short  → traceback corto si falla (más fácil de leer)
addopts = -v --tb=short
