name: CI — Backend FastAPI

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'Python-FastAPI/backend/**'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'Python-FastAPI/backend/**'

defaults:
  run:
    working-directory: Python-FastAPI/backend

jobs:
  # ── Job 1: Tests ──────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: test-secret-key-for-ci-only
      DEBUG: "True"
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: "5432"
      APP_NAME: "FastAPI CI"
      APP_DESCRIPTION: "CI Test Run"
      APP_VERSION: "1.0.0"
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Python-FastAPI/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest --tb=short -q

  # ── Job 2: Docker Build + Push a Docker Hub ───────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: Python-FastAPI/backend
          push: ${{ github.event_name == 'push' }}
          tags: |
            stgcontacto/fastapi-backend:latest
            stgcontacto/fastapi-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy a Railway ───────────────────────────────────────────────
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Deploy to Railway
        run: railway up --service FastAPI --detach
        working-directory: Python-FastAPI/backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
