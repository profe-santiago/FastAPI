name: CI — Backend FastAPI

on:
  push:
    branches: [master]
    # ❌ ERROR: 'paths: backend/**' never matched any file — the repo root IS the backend,
    #           so no file lives under a backend/ subfolder; the job never triggered on changes
    # ✅ FIXED: removed paths filter so the workflow triggers on every push to master
  pull_request:
    branches: [master]
    # ❌ ERROR: same as above — 'paths: backend/**' never matched, blocking PR checks
    # ✅ FIXED: removed paths filter

# ❌ ERROR: 'defaults.run.working-directory: backend' caused "No such file or directory"
#           because the runner looked for /home/runner/work/FastAPI/FastAPI/backend
#           which doesn't exist — the repo root IS the backend, there is no backend/ subfolder
# ✅ FIXED: removed the defaults block entirely; all run steps execute from the repo root

jobs:
  # ── Job 1: Tests ──────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    # ❌ ERROR: FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 was in a separate env block above
    #           the application env block; YAML only keeps the last duplicate key,
    #           so the flag was silently overridden and the Node.js 20 warning persisted
    # ✅ FIXED: merged both env blocks into one so all variables are active
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SECRET_KEY: test-secret-key-for-ci-only
      DEBUG: "True"
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: "5432"
      APP_NAME: "FastAPI CI"
      APP_DESCRIPTION: "CI Test Run"
      APP_VERSION: "1.0.0"
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          # ❌ ERROR: was 'backend/requirements.txt' — path doesn't exist because
          #           all files are at the repo root, not inside a backend/ subfolder
          # ✅ FIXED: changed to 'requirements.txt' — correct path from repo root
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest --tb=short -q

  # ── Job 2: Docker Build + Push a Docker Hub ───────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        # ❌ ERROR: the 'uses:' keyword was split mid-word by an inline comment
        #           ('us# comment... es: docker/build-push-action@v5'), producing
        #           invalid YAML that broke the entire docker job
        # ✅ FIXED: restored 'uses:' as a single unbroken keyword on its own line
        uses: docker/build-push-action@v5
        with:
          # ❌ ERROR: was 'context: backend' — no backend/ subfolder exists at repo root,
          #           so Docker had no build context and the step would fail
          # ✅ FIXED: changed to 'context: .' — uses the repo root as the build context
          context: .
          push: ${{ secrets.DOCKERHUB_USERNAME != '' && github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            stgcontacto/fastapi-backend:latest
            stgcontacto/fastapi-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy a Railway (solo en main) ────────────────────────────────
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        # ❌ ERROR: had 'working-directory: Python-FastAPI/backend' — that path
        #           doesn't exist on the runner; it was a leftover from a local folder
        #           structure that doesn't reflect the repository layout
        # ✅ FIXED: removed working-directory; the step runs from the repo root
        run: railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
